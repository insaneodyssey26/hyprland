[main]
font=Geist Medium:size=11
prompt="❯ "
icon-theme=Papirus-Dark
width=45
lines=10
horizontal-pad=20
vertical-pad=15
inner-pad=10
line-height=25
letter-spacing=0.2
selection-wrap=yes

# Border settings in main for compatibility
border-radius=40
border-width=3

[colors]
text={{colors.on_surface.default.hex}}ff
prompt={{colors.primary.default.hex}}ff
input={{colors.on_surface.default.hex}}ff
match={{colors.primary.default.hex}}ff
selection={{colors.surface_container_highest.default.hex}}80
selection-text={{colors.primary.default.hex}}ff
selection-match={{colors.primary.default.hex}}ff
background={{colors.surface.default.hex}}e6
# High-visibility primary border
border={{colors.primary.default.hex}}ff

[border]
radius=40
width=3
