# --- The Layout Fix (Prevents Overlapping) ---
# We lower the scale so Adwaita Sans has room to sit beside the icons
ui_scale=0.7
font_scale=0.8

# --- Icons & Fonts ---
# This font is now in your ~/.config/mpv/fonts folder thanks to the zip
font_bold=Adwaita Sans Semibold

# --- Spacing ---
# Widening the menu and timeline prevents the text from crashing together
timeline_size=32
controls_size=38
menu_item_height=36
menu_min_width=260

# --- Colors (Your Signature Blue) ---
color=foreground=3b82f6,background=000000,text=ffffff
