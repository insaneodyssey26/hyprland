# --- UI & Aesthetics ---
osc=no                          # Required for uosc
border=no                       # Borderless window
osd-bar=no                      # Hide default progress bar
cursor-autohide=1000            # Hide cursor after 1 second
osd-font='Adwaita Sans'
osd-font-size=30

# --- Performance (NVIDIA + Wayland Fixes) ---
vo=gpu-next                     # FIX: Solves Wayland UI click offset
gpu-api=vulkan                  # Best for RTX 4050 on Wayland
hwdec=nvdec-copy                # FIX: Forces Nvidia native decoder instead of auto
profile=gpu-hq                  # High-quality shaders
video-sync=display-resample     # Smooths out UI animations

# --- High-End Scaling (Crisp 1080p) ---
scale=ewa_lanczossharp
cscale=ewa_lanczossharp

# --- Anti-Freeze Cache (Solves rapid seeking lockups) ---
cache=yes                       # Enables RAM caching
demuxer-max-bytes=500M          # Gives mpv a 500MB forward buffer
demuxer-max-back-bytes=200M     # Keeps 200MB of past video in RAM
hr-seek-framedrop=yes           # Drops frames smoothly instead of freezing

# --- Behavior ---
save-position-on-quit=yes
keep-open=yes                   # Stay open after video ends

# --- Wayland Input Fixes ---
wayland-app-id=mpv
