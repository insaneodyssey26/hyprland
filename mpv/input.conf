# --- VOLUME (Your Custom Preference) ---
UP    add volume 2
DOWN  add volume -2
m     cycle mute

# --- PLAYBACK CONTROLS (VLC Style) ---
SPACE cycle pause
f     cycle fullscreen
ESC   set fullscreen no
s     stop
n     playlist-next
p     playlist-prev
e     frame-step          # VLC's "Next Frame" key

# --- THE "TIERED" SEEKING (VLC's Best Feature) ---
# Very Short (3s)
SHIFT+RIGHT seek  3
SHIFT+LEFT  seek -3

RIGHT seek  5
LEFT  seek -5

# Short (10s)
ALT+RIGHT   seek  10
ALT+LEFT    seek -10

# Medium (1m)
CTRL+RIGHT  seek  60
CTRL+LEFT   seek -60

# Long (5m)
CTRL+ALT+RIGHT seek  300
CTRL+ALT+LEFT  seek -300

# --- OTHER PRO STUFF ---
v     cycle sub           # Cycle Subtitles
b     cycle audio         # Cycle Audio Tracks
[     add speed -0.1      # Slower
]     add speed 0.1       # Faster
=     set speed 1.0       # Reset Speed (VLC's standard)
S     screenshot          # Shift+S for Screenshot