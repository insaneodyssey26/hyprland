general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    # Takes a blurred snapshot of your current workspace
    path = screenshot
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# --- INPUT FIELD ---
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(59, 130, 246) # Signature Blue
    inner_color = rgb(15, 15, 26)  # Waybar Pill Color
    font_color = rgb(255, 255, 255)
    fade_on_empty = true
    placeholder_text = <span foreground="##ffffff77">󰌾  Logged in as <b>$USER</b></span>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
    fall_timeout = 2000
}

# --- CLOCK (Hours:Minutes:Seconds) ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M:%S")"
    color = rgba(255, 255, 255, 1.0)
    font_size = 90
    font_family = Adwaita Sans Bold
    position = 0, 140
    halign = center
    valign = center
}

# --- DATE ---
label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(255, 255, 255, 0.7)
    font_size = 22
    font_family = Adwaita Sans
    position = 0, 50
    halign = center
    valign = center
}

# --- GREETING ---
label {
    monitor =
    text = Hello, Masum
    color = rgba(255, 255, 255, 0.6)
    font_size = 18
    font_family = Adwaita Sans
    position = 0, -10
    halign = center
    valign = center
}

# --- SYSTEM STATUS (Battery) ---
label {
    monitor =
    text = cmd[update:1000] echo "󰁹 $(cat /sys/class/power_supply/BAT1/capacity)%"
    color = rgb(59, 130, 246) # Blue accent
    font_size = 14
    font_family = Adwaita Sans
    position = 0, -180
    halign = center
    valign = center
}
