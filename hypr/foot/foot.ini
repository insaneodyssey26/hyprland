# ~/.config/foot/foot.ini
# Matched to Kitty configuration 

[main]
include=~/.config/foot/colors.ini
font=GeistMono Nerd Font Mono:size=12
initial-window-size-pixels=950x500
pad=15x15
dpi-aware=no
selection-target=both

[scrollback]
lines=2000

[cursor]
style=beam
blink=yes

[bell]
system=no

[colors-dark]
# Matches your background_opacity 0.8
alpha=0.8

[key-bindings]
# Keybindings for clipboard actions
clipboard-copy=Control+Shift+c
clipboard-paste=Control+v
