source = ~/.config/hypr/colors.conf

# Monitor
monitor=eDP-1, 1920x1080@144, 0x0, 1

# Apps
$terminal = kitty
$menu = wofi --show drun

# Volume Control
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

# Toggle Microphone Mute
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle && notify-send "Microphone" "$(wpctl get-volume @DEFAULT_AUDIO_SOURCE@ | grep -q 'MUTED' && echo 'Muted' || echo 'Unmuted')" -t 1000

# Screen Brightness
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Keybinds
bind = SUPER, T, exec, $terminal
bind = SUPER, D, exec, $menu
bind = SUPER, Q, killactive
bind = SUPER, B, exec, brave
bind = SUPER, E, exec, thunar

# Scratchpad / Minimizing
bind = SUPER, H, movetoworkspacesilent, special:minimized
bind = SUPER SHIFT, H, togglespecialworkspace

# Power & Lock
bind = SUPER, L, exec, hyprlock & sleep 2 && hyprctl dispatch dpms off
bindl = , Pause, exec, pidof hyprlock && (sleep 0.5 && hyprctl dispatch dpms off)

# --- Master Screenshot Shortcuts ---
bind = , PRINT, exec, grimblast --freeze copysave screen ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png
bind = SUPER, PRINT, exec, grimblast --freeze save active - | satty --filename -

# Workspaces
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

# Wallpaper & Theme Sync
bind = SUPER, W, exec, ~/.config/hypr/scripts/random-wall.fish

# Move to workspace
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7

# Mouse binds
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Navigation
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d

# Manipulation
bind = SUPER SHIFT, left,  movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up,    movewindow, u
bind = SUPER SHIFT, down,  movewindow, d

bind = SUPER, F, fullscreen
bind = SUPER, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = SUPER, R, exec, wofi --show drun

# Autostart
exec-once = waybar
exec-once = awww-daemon
exec-once = awww restore
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = walker --service
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = hypridle

# --- Premium Decoration Settings ---
decoration {
    rounding = 12 # Slightly smoother for the premium look

    active_opacity = 1.0
    inactive_opacity = 0.92 # Subtle depth difference

    shadow {
        enabled = true
        range = 25 # Soft, wide spread
        render_power = 3
        # Uses a high-opacity version of your dark surface color
        color = rgba(0e1513ee) 
        color_inactive = rgba(00000066)
    }

    blur {
        enabled = true
        size = 8
        passes = 3 # Richer frosted glass effect
        new_optimizations = true
        ignore_opacity = true
    }
}

# --- Smooth Motion Design ---
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05 # Added a tiny snap overshoot

    animation = windows, 1, 6, myBezier, slide
    animation = windowsOut, 1, 6, myBezier, popin 80%
    animation = fade, 1, 4, default
    animation = workspaces, 1, 5, myBezier, slidefade 20%
}

# --- Structural Hairline Borders ---
general {
    gaps_in = 5
    gaps_out = 10 # More breathing room for shadows
    border_size = 1 # Hairline border for precision
    
    # Subtle primary color accent
    col.active_border = rgba(82d5c833) 
    col.inactive_border = rgba(00000000)

    layout = dwindle
}

misc {
    force_default_wallpaper = 0 # Disable annoying hyprland logo
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    # Focus on low-latency
    vfr = true 
}

input {
    kb_layout = us
    numlock_by_default = true

    touchpad {
        natural_scroll = true
        disable_while_typing = true
    }

    sensitivity = 0 
}