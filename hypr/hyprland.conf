# -----------------------------------------------------
# NVIDIA & WAYLAND ENVIRONMENT VARIABLES
# -----------------------------------------------------
# Core Nvidia stability
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

# Fix for Electron Apps (VS Code, Brave, Discord etc.)
# Resolves flickering via the 'syncobj' protocol (Electron 35+)
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Hardware Acceleration for Video
env = NVD_BACKEND,direct

# Cursor Configuration (Hyprcursor/XCursor)
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24

# -----------------------------------------------------
# SOURCE & MONITOR
# -----------------------------------------------------
source = ~/.config/hypr/colors.conf
monitor=eDP-1, 1920x1080@144, 0x0, 1

# -----------------------------------------------------
# APPS & VARIABLES
# -----------------------------------------------------
$terminal = kitty
$menu = fuzzel

# -----------------------------------------------------
# AUTOSTART
# -----------------------------------------------------
exec-once = waybar
exec-once = awww-daemon && awww restore
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = hypridle
exec-once = swaync

# -----------------------------------------------------
# INPUT & CURSOR
# -----------------------------------------------------
input {
    kb_layout = us
    numlock_by_default = true
    touchpad {
        natural_scroll = true
        disable_while_typing = true
    }
    sensitivity = 0
}

cursor {
    no_hardware_cursors = true
}

# -----------------------------------------------------
# GENERAL & DECORATION
# -----------------------------------------------------
general {
    gaps_in = 6
    gaps_out = 8
    border_size = 1
    col.active_border = rgba(82d5c833)
    col.inactive_border = rgba(00000000)
    layout = dwindle
}

decoration {
    rounding = 15
    active_opacity = 1.0
    inactive_opacity = 0.92

    shadow {
        enabled = true
        range = 30
        render_power = 3
        color = rgba(0e1513ee)
        color_inactive = rgba(00000066)
    }

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = true
    }
}

# -----------------------------------------------------
# ANIMATIONS
# -----------------------------------------------------
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 6, myBezier, slide
    animation = windowsOut, 1, 6, myBezier, popin 80%
    animation = fade, 1, 4, default
    animation = workspaces, 1, 5, myBezier, slidefade 20%
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vfr = true
    vrr = 1
}

# -----------------------------------------------------
# KEYBINDS - APPS
# -----------------------------------------------------
bind = SUPER, T, exec, $terminal
bind = SUPER, D, exec, $menu
bind = SUPER, Q, killactive
bind = SUPER, B, exec, brave-origin-beta
bind = SUPER SHIFT, B, exec, brave-origin-beta --disable-gpu-compositing
bind = SUPER, E, exec, nemo
bind = SUPER SHIFT, E, exec, kitty -e yazi
bind = SUPER, C, exec, qalculate-gtk
# Color Picker with delay-safe notification
bind = SUPER, Y, exec, bash -c 'color=$(hyprpicker -a); notify-send "Color Picked" "$color" -t 2000'

# -----------------------------------------------------
# KEYBINDS - NAVIGATION
# -----------------------------------------------------
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d

bind = SUPER SHIFT, left,  movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up,    movewindow, u
bind = SUPER SHIFT, down,  movewindow, d

bind = SUPER, F, fullscreen
bind = SUPER, SPACE, togglefloating

# Resizing and Moving (Active Windows)
binde = SUPER CTRL, right, resizeactive, 20 0
binde = SUPER CTRL, left, resizeactive, -20 0
binde = SUPER CTRL, up, resizeactive, 0 -20
binde = SUPER CTRL, down, resizeactive, 0 20

binde = SUPER ALT, right, moveactive, 20 0
binde = SUPER ALT, left, moveactive, -20 0
binde = SUPER ALT, up, moveactive, 0 -20
binde = SUPER ALT, down, moveactive, 0 20

# Mouse binds
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# -----------------------------------------------------
# KEYBINDS - WORKSPACES
# -----------------------------------------------------
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9

# -----------------------------------------------------
# KEYBINDS - SYSTEM & SCRIPTS
# -----------------------------------------------------
# Volume & Media
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle && notify-send "Microphone" "$(wpctl get-volume @DEFAULT_AUDIO_SOURCE@ | grep -q 'MUTED' && echo 'Muted' || echo 'Unmuted')" -t 1000

# Brightness
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Power & Locking
bind = SUPER, L, exec, hyprlock & sleep 2 && hyprctl dispatch dpms off
bindl = , Pause, exec, pidof hyprlock && (sleep 0.5 && hyprctl dispatch dpms off)
bind = SUPER, Escape, exec, ~/.config/hypr/scripts/power.sh

# Utilities
bind = , PRINT, exec, grimblast --freeze copysave screen ~/Pictures/Screenshots/$(date +'%Y-%m-%d_%H-%M-%S').png
bind = SUPER, PRINT, exec, grimblast --freeze save active - | satty --filename -
bind = SUPER, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy
bind = SUPER, X, exec, ~/.config/hypr/scripts/kill_task.sh
bind = SUPER, P, exec, ~/.config/hypr/scripts/project_launcher.sh
bind = SUPER, K, exec, ~/.config/hypr/scripts/toggle_osk.sh
bind = SUPER, period, exec, bemoji -p fuzzel
bind = SUPER, N, exec, swaync-client -t -sw
bind = SUPER, H, exec, pkill -USR1 waybar
bind = SUPER, S, exec, ~/.config/hypr/scripts/fuzzel_sys.sh

# Themes
bind = SUPER, W, exec, ~/.config/hypr/scripts/random-wall.fish
