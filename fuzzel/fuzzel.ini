[main]
exit-on-lost-focus=yes
layer=top
font=Geist Medium:size=11
prompt="❯ "
icon-theme=Papirus-Dark
width=45
lines=10
horizontal-pad=20
vertical-pad=15
inner-pad=10
line-height=25
letter-spacing=0.2
selection-wrap=yes

# Border settings in main for compatibility
border-radius=40
border-width=3

[colors]
text=#e3e2e2ff
prompt=#b1cbd3ff
input=#e3e2e2ff
match=#b1cbd3ff
selection=#34353580
selection-text=#b1cbd3ff
selection-match=#b1cbd3ff
background=#121414e6
# High-visibility primary border
border=#b1cbd3ff

[border]
radius=40
width=3
