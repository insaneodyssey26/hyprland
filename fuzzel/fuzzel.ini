[main]
font=Geist:weight=bold:size=8
prompt="❯ "
icon-theme=Papirus
width=40
lines=10
horizontal-pad=15
vertical-pad=10
inner-pad=8
line-height=20
letter-spacing=0.5
border-radius=12
border-width=0

[colors]
# The main text color (Apps and list items)
text=#e7e0e8ff

# The color of the '❯' prompt specifically
prompt=#d1bcfdff

# The color of the characters you have typed (Searching)
input=#e7e0e8ff

# The color of the matched characters in the list
match=#d1bcfdff

# Selection colors (When you hover/highlight an item)
selection=#d1bcfd44
selection-text=#d1bcfdff
selection-match=#d1bcfdff

background=#141218dd
border=00000000

[border]
width=0
radius=12
